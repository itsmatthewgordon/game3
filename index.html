<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Башня Михалыча - Habit Village</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #110a05; color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            overflow: hidden; user-select: none; -webkit-user-select: none;
            touch-action: none; display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }
        #gameContainer {
            position: relative; width: 100%; max-width: 450px; height: 100vh;
            background: #1a0d04; box-shadow: 0 0 30px rgba(0,0,0,0.8); overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui {
            position: absolute; top: 25px; left: 0; width: 100%;
            text-align: center; pointer-events: none; z-index: 5;
        }
        .score-title { font-size: 28px; font-weight: 900; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); color: #f1c40f; }
        #comboText {
            font-size: 18px; font-weight: bold; color: #38bdf8; margin-top: 5px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8); height: 25px;
            transition: transform 0.1s ease;
        }
        .screen-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 10, 5, 0.95); z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; box-sizing: border-box; text-align: center;
        }
        h1 { color: #e67e22; font-size: 32px; font-weight: 900; margin-bottom: 10px; text-shadow: 0 0 10px rgba(230,126,34,0.3); }
        p { color: #cd9b74; font-size: 15px; line-height: 1.6; margin: 0 0 20px 0; }
        .btn {
            background: linear-gradient(135deg, #d35400, #e67e22); color: white;
            border: none; padding: 14px 35px; font-size: 16px; font-weight: bold;
            border-radius: 30px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 6px 20px rgba(211,84,0,0.4); transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        #rewardInfo {
            background: rgba(0,0,0,0.4); border: 2px solid #34495e; padding: 15px;
            border-radius: 15px; margin-bottom: 25px; width: 80%;
        }
        .wood-count { color: #2ecc71; font-size: 24px; font-weight: 900; display: block; margin-top: 5px; }
        #tapHint {
            position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 14px; font-weight: 500; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="ui">
        <div class="score-title">ЭТАЖИ: <span id="scoreVal">0</span></div>
        <div id="comboText"></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="tapHint">Тапай в любом месте или жми Пробел!</div>

    <!-- Главный Экран -->
    <div id="screenOverlay" class="screen-overlay">
        <h1 id="screenTitle">ВЕЛИКАЯ СТРОЙКА</h1>
        <p id="screenDesc">Помоги Михалычу возвести Ратушу века! Роняй сосновые брусья ровно друг на друга. Выступающие части с рёвом отпилит циркулярная пила!</p>
        
        <div id="rewardInfo" style="display:none;">
            <p style="margin:0; color:#bdc3c7;">Высота башни: <span id="finalScore" style="color:#fff; font-weight:bold;">0</span></p>
            <p style="margin:5px 0 0 0; color:#bdc3c7;">Добыто ресурсов: <span id="finalWood" class="wood-count">0 🪵</span></p>
        </div>
        
        <button id="actionBtn" class="btn" onclick="handleBtnClick()">Раздуть стройку! 🏗️</button>
    </div>
</div>

<script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) { tg.ready(); tg.expand(); }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0; let combo = 0; let gameActive = false;
    let blocks = []; let fallingSlices = []; let particles = [];
    let activeBlock = {}; let cameraY = 0; let targetCameraY = 0;
    let screenShake = 0; let audioCtx = null;

    const BLOCK_HEIGHT = 35; const BASE_WIDTH = 200;

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playSound(type) {
        if (!audioCtx) return;
        try {
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'perfect') {
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'land') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(160, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'fail') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            }
        } catch(e){}
    }

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        if(!gameActive && blocks.length === 0) { drawMenuBackground(); }
    }
    window.addEventListener('resize', resize);

    function drawMenuBackground() {
        ctx.fillStyle = '#1a0d04'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function spawnParticles(x, y, color, count=10) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 1.2) * 5,
                size: Math.random() * 4 + 2, alpha: 1, color: color
            });
        }
    }

    function startGame() {
        initAudio();
        document.getElementById('screenOverlay').style.display = 'none';
        score = 0; combo = 0; cameraY = 0; targetCameraY = 0; screenShake = 0;
        fallingSlices = []; particles = [];
        document.getElementById('scoreVal').innerText = score;
        document.getElementById('comboText').innerText = '';

        blocks = [{
            x: (canvas.width - BASE_WIDTH) / 2,
            y: canvas.height - BLOCK_HEIGHT - 30,
            width: BASE_WIDTH,
            color: '#5c3a1a'
        }];

        gameActive = true;
        spawnNextBlock();
        requestAnimationFrame(gameLoop);
    }

    function spawnNextBlock() {
        const topBlock = blocks[blocks.length - 1];
        let speed = 3.0 + Math.min(5, score * 0.2);
        const movingRight = Math.random() > 0.5;

        activeBlock = {
            x: movingRight ? 0 : canvas.width - topBlock.width,
            y: topBlock.y - BLOCK_HEIGHT,
            width: topBlock.width,
            speed: movingRight ? speed : -speed,
            color: `hsl(${30 + (score * 4) % 20}, ${60 + (score % 2) * 15}%, ${35 + (score % 3) * 5}%)`
        };

        if (activeBlock.y < canvas.height * 0.55) {
            targetCameraY = canvas.height * 0.55 - activeBlock.y;
        }
    }

    function handleTap() {
        if (!gameActive) return;

        const topBlock = blocks[blocks.length - 1];
        const diff = activeBlock.x - topBlock.x;

        // Фикс идеальной зоны ловли (Perfect!)
        if (Math.abs(diff) <= 8) {
            activeBlock.x = topBlock.x; 
            combo++;
            screenShake = 6;
            playSound('perfect');
            document.getElementById('comboText').innerText = `🔥 ИДЕАЛЬНО! x${combo}`;
            spawnParticles(activeBlock.x + activeBlock.width/2, activeBlock.y + BLOCK_HEIGHT, '#f1c40f', 20);
        } else {
            combo = 0;
            screenShake = 3;
            document.getElementById('comboText').innerText = '';
            playSound('land');

            // Расчет физического отпила
            let sliceX, sliceWidth;
            if (diff < 0) { // Отпил слева
                sliceX = activeBlock.x; sliceWidth = topBlock.x - activeBlock.x;
                activeBlock.width += diff; activeBlock.x = topBlock.x;
            } else { // Отпил справа
                sliceX = topBlock.x + topBlock.width; sliceWidth = diff;
                activeBlock.width -= diff;
            }

            if (activeBlock.width > 0) {
                fallingSlices.push({
                    x: sliceX, y: activeBlock.y, width: sliceWidth, height: BLOCK_HEIGHT,
                    vx: diff < 0 ? -2 : 2, vy: -1, angle: 0, rotSpeed: (Math.random() - 0.5) * 0.2,
                    color: activeBlock.color
                });
                spawnParticles(sliceX + sliceWidth/2, activeBlock.y + BLOCK_HEIGHT/2, '#cd853f', 12);
            }
        }

        // Крах строения
        if (activeBlock.width <= 0) {
            endGame();
            return;
        }

        blocks.push({
            x: activeBlock.x, y: activeBlock.y, width: activeBlock.width, color: activeBlock.color
        });

        score++;
        document.getElementById('scoreVal').innerText = score;
        spawnNextBlock();
    }

    function endGame() {
        gameActive = false; playSound('fail'); screenShake = 15;
        
        // Массивный взрыв остатков последнего бруса
        spawnParticles(activeBlock.x + activeBlock.width/2, activeBlock.y, activeBlock.color, 35);

        const totalWood = Math.min(100, score * 4);

        document.getElementById('screenTitle').innerText = "СТРОЙКА РУХНУЛА! 💥";
        document.getElementById('screenDesc').innerText = "Конструкция Михалыча потеряла баланс. Логистика Деревни подсчитывает убытки.";
        document.getElementById('finalScore').innerText = score;
        document.getElementById('finalWood').innerText = totalWood + " 🪵";
        document.getElementById('rewardInfo').style.display = 'block';
        document.getElementById('actionBtn').innerText = "Забрать дрова 🪵";

        document.getElementById('screenOverlay').style.display = 'flex';
    }

    function handleBtnClick() {
        const btnText = document.getElementById('actionBtn').innerText;
        if (btnText.includes("ЗАБРАТЬ") || btnText.includes("ОТПРАВИТЬ")) {
            if (tg) { tg.sendData("tower_score:" + score); tg.close(); } 
            else { 
                alert("WebApp Тест: Ушло в бот tower_score:" + score); 
                document.getElementById('rewardInfo').style.display = 'none';
                document.getElementById('actionBtn').innerText = "Раздуть стройку! 🏗️";
            }
        } else {
            startGame();
        }
    }

    // Обработчики ввода
    window.addEventListener('touchstart', (e) => {
        if(e.target.classList.contains('btn')) return;
        e.preventDefault(); handleTap();
    }, {passive: false});

    window.addEventListener('mousedown', (e) => {
        if(e.target.classList.contains('btn')) return;
        handleTap();
    });

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); handleTap(); }
    });

    function gameLoop() {
        if (!gameActive && fallingSlices.length === 0 && particles.length === 0) return;

        // Камера плавно догоняет вершину башни
        cameraY += (targetCameraY - cameraY) * 0.1;

        ctx.save();
        // Рендер тряски экрана
        if (screenShake > 0) {
            let dx = (Math.random() - 0.5) * screenShake; let dy = (Math.random() - 0.5) * screenShake;
            ctx.translate(dx, dy); screenShake *= 0.8;
            if(screenShake < 0.5) screenShake = 0;
        }

        // 1. Отрисовка динамического неба Кибер-Деревни
        let h1 = Math.max(10, 35 - score * 0.6);
        let h2 = Math.max(5, 15 - score * 0.4);
        let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, `hsl(210, 40%, ${h2}%)`);
        gradient.addColorStop(1, `hsl(25, 50%, ${h1}%)`);
        ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Космические звёзды на большой высоте
        if (score > 15) {
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            for(let i=0; i<20; i++) {
                let sx = (Math.sin(i * 333) * 0.5 + 0.5) * canvas.width;
                let sy = ((Math.cos(i * 777) * 0.5 + 0.5) * canvas.height + cameraY * 0.3) % canvas.height;
                ctx.fillRect(sx, sy, 2, 2);
            }
        }

        // 2. Рендер установленной башни
        blocks.forEach((b, index) => {
            if (b.y - cameraY > canvas.height) return;
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y - cameraY, b.width, BLOCK_HEIGHT);

            // Текстурный узор коры
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            ctx.fillRect(b.x, b.y - cameraY + BLOCK_HEIGHT - 6, b.width, 6);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.fillRect(b.x, b.y - cameraY, b.width, 5);
        });

        // 3. Обновление и рендер падающих щепок (Отпилы)
        for(let i = fallingSlices.length - 1; i >= 0; i--) {
            let s = fallingSlices[i];
            s.x += s.vx; s.vy += 0.3; s.y += s.vy; s.angle += s.rotSpeed;
            
            ctx.save();
            ctx.translate(s.x + s.width/2, s.y + s.height/2 - cameraY);
            ctx.rotate(s.angle);
            ctx.fillStyle = s.color;
            ctx.fillRect(-s.width/2, -s.height/2, s.width, s.height);
            ctx.restore();

            if(s.y - cameraY > canvas.height) fallingSlices.splice(i, 1);
        }

        // 4. Частицы/Искры
        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.vy += 0.15; p.y += p.vy; p.alpha -= 0.02;
            if(p.alpha <= 0) { particles.splice(i, 1); continue; }
            ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y - cameraY, p.size, p.size); ctx.restore();
        }

        // 5. Движение активного летящего бруса
        if (gameActive) {
            activeBlock.x += activeBlock.speed;
            if (activeBlock.speed > 0 && activeBlock.x + activeBlock.width >= canvas.width) {
                activeBlock.speed = -activeBlock.speed; activeBlock.x = canvas.width - activeBlock.width;
            } else if (activeBlock.speed < 0 && activeBlock.x <= 0) {
                activeBlock.speed = -activeBlock.speed; activeBlock.x = 0;
            }
            ctx.fillStyle = activeBlock.color;
            ctx.fillRect(activeBlock.x, activeBlock.y - cameraY, activeBlock.width, BLOCK_HEIGHT);
            
            // Текстура на летящем блоке
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            ctx.fillRect(activeBlock.x, activeBlock.y - cameraY + BLOCK_HEIGHT - 6, activeBlock.width, 6);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.fillRect(activeBlock.x, activeBlock.y - cameraY, activeBlock.width, 5);
        }

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    // Первичный запуск
    resize();
</script>
</body>
</html>
