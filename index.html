<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Башня Михалыча - Habit Village</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #0b0603; color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            overflow: hidden; user-select: none; -webkit-user-select: none;
            touch-action: none; display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }
        #gameContainer {
            position: relative; width: 100%; max-width: 450px; height: 100vh;
            background: #110702; box-shadow: 0 0 30px rgba(0,0,0,0.9); overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui {
            position: absolute; top: 25px; left: 0; width: 100%;
            text-align: center; pointer-events: none; z-index: 5;
        }
        .score-title { font-size: 28px; font-weight: 900; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); color: #f1c40f; }
        #comboText {
            font-size: 18px; font-weight: bold; color: #38bdf8; margin-top: 5px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8); height: 25px;
            transition: transform 0.1s ease;
        }
        .screen-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 7, 3, 0.96); z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        h1 { color: #e67e22; font-size: 32px; font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 10px rgba(230,126,34,0.3); }
        p { color: #cd9b74; font-size: 14px; line-height: 1.5; margin: 0 0 15px 0; }
        .btn {
            background: linear-gradient(135deg, #d35400, #e67e22); color: white;
            border: none; padding: 14px 35px; font-size: 16px; font-weight: bold;
            border-radius: 30px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 6px 20px rgba(211,84,0,0.4); transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        #rewardInfo {
            background: rgba(0,0,0,0.5); border: 2px solid #34495e; padding: 15px;
            border-radius: 15px; margin-bottom: 25px; width: 85%; box-sizing: border-box;
        }
        .wood-count { color: #2ecc71; font-size: 24px; font-weight: 900; display: block; margin-top: 5px; }
        #tapHint {
            position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center;
            color: rgba(255,255,255,0.35); font-size: 13px; font-weight: 500; pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }
        
        /* СТИЛИ ДЛЯ ТАБЛИЦЫ ЛИДЕРОВ БАШНИ */
        .leaderboard-box {
            background: rgba(26, 14, 7, 0.85); border: 1px solid #d35400;
            border-radius: 12px; padding: 12px 15px; margin-bottom: 20px;
            width: 85%; box-sizing: border-box;
        }
        .leaderboard-title {
            font-size: 13px; font-weight: bold; color: #e67e22;
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
        }
        .leaderboard-row {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; margin: 5px 0; color: #cd9b74;
            border-bottom: 1px solid rgba(211,84,0,0.1); padding-bottom: 3px;
        }
        .leaderboard-row:last-child { border-bottom: none; }
        .leader-name { font-weight: bold; color: #fff; margin-left: 5px; }
        .leader-score { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="ui">
        <div class="score-title">ЭТАЖИ: <span id="scoreVal">0</span></div>
        <div id="comboText"></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="tapHint">Тапай по экрану или жми Пробел, чтобы сбросить брус!</div>

    <!-- Главный Экран -->
    <div id="screenOverlay" class="screen-overlay">
        <h1 id="screenTitle">БАШНЯ МИХАЛЫЧА</h1>
        <p id="screenDesc">Построй легендарный деревянный небоскрёб Кибер-Деревни! Роняй брусья идеально ровно. За идеальные попадания — сочные бонусы к Казне!</p>
        
        <!-- Блок Глобального Топа -->
        <div id="leaderboardContainer" class="leaderboard-box" style="display:none;">
            <div class="leaderboard-title">🏆 ТОП-5 АРХИТЕКТОРОВ БАШНИ 🏆</div>
            <div id="leaderboardList"></div>
        </div>

        <div id="rewardInfo" style="display:none;">
            <p style="margin:0; color:#bdc3c7;">Высота башни: <span id="finalScore" style="color:#fff; font-weight:bold;">0</span></p>
            <p style="margin:5px 0 0 0; color:#bdc3c7;">Добыто ресурсов: <span id="finalWood" class="wood-count">0 🪵</span></p>
        </div>
        
        <button id="actionBtn" class="btn" onclick="handleBtnClick()">Начать стройку! 🏗️</button>
    </div>
</div>

<script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) { tg.ready(); tg.expand(); }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0; let combo = 0; let gameActive = false;
    let blocks = []; let fallingSlices = []; let particles = []; let clouds = [];
    let activeBlock = {}; let cameraOffsetY = 0; let targetCameraOffsetY = 0;
    let screenShake = 0; let audioCtx = null;

    const BLOCK_HEIGHT = 32; const BASE_WIDTH = 180;

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playSound(type) {
        if (!audioCtx) return;
        try {
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'perfect') {
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // Нота До
                osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'land') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(90, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'fail') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        } catch(e){}
    }

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        if (!gameActive && blocks.length === 0) {
            ctx.fillStyle = '#110702'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }
    window.addEventListener('resize', resize);

    function initClouds() {
        clouds = [];
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (canvas.height - 300) + 50,
                width: Math.random() * 50 + 40,
                speed: Math.random() * 0.3 + 0.1
            });
        }
    }

    function spawnParticles(x, y, color, count=10) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 1.2) * 5,
                size: Math.random() * 4 + 2, alpha: 1, color: color
            });
        }
    }

    // ФУНКЦИЯ ДЛЯ ПАРСИНГА И ВЫВОДА ТАБЛИЦЫ ЛИДЕРОВ
    function loadLeaderboard() {
        const urlParams = new URLSearchParams(window.location.search);
        const topData = urlParams.get('top');
        const container = document.getElementById('leaderboardContainer');
        const list = document.getElementById('leaderboardList');
        
        if (topData && topData.trim() !== "") {
            list.innerHTML = "";
            const leaders = topData.split(',');
            leaders.forEach((leader, index) => {
                const [username, lScore] = leader.split('-');
                if (username && lScore) {
                    let medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : `📜 ${index + 1}.`;
                    const row = document.createElement('div');
                    row.className = 'leaderboard-row';
                    row.innerHTML = `<span>${medal}<span class="leader-name">${username}</span></span><span class="leader-score">${lScore} эт.</span>`;
                    list.appendChild(row);
                }
            });
            container.style.display = 'block';
        } else {
            container.style.display = 'none';
        }
    }

    function startGame() {
        initAudio();
        document.getElementById('screenOverlay').style.display = 'none';
        score = 0; combo = 0; cameraOffsetY = 0; targetCameraOffsetY = 0; screenShake = 0;
        fallingSlices = []; particles = [];
        document.getElementById('scoreVal').innerText = score;
        document.getElementById('comboText').innerText = '';
        
        initClouds();

        blocks = [{
            x: (canvas.width - BASE_WIDTH) / 2,
            y: canvas.height - BLOCK_HEIGHT - 40,
            width: BASE_WIDTH,
            color: '#4d260d'
        }];

        gameActive = true;
        spawnNextBlock();
        requestAnimationFrame(gameLoop);
    }

    function spawnNextBlock() {
        const topBlock = blocks[blocks.length - 1];
        let speed = 2.8 + Math.min(5.5, score * 0.22);
        const movingRight = Math.random() > 0.5;

        activeBlock = {
            x: movingRight ? 0 : canvas.width - topBlock.width,
            y: topBlock.y - BLOCK_HEIGHT,
            width: topBlock.width,
            speed: movingRight ? speed : -speed,
            color: `hsl(${25 + (score * 5) % 25}, ${65 + (score % 2) * 10}%, ${38 + (score % 3) * 4}%)`
        };

        if (activeBlock.y < canvas.height * 0.45) {
            targetCameraOffsetY = canvas.height * 0.45 - activeBlock.y;
        }
    }

    function handleTap() {
        if (!gameActive) return;

        const topBlock = blocks[blocks.length - 1];
        const diff = activeBlock.x - topBlock.x;

        if (Math.abs(diff) <= 7) {
            activeBlock.x = topBlock.x; 
            combo++;
            screenShake = 6;
            playSound('perfect');
            document.getElementById('comboText').innerText = `🔥 PERFECT! x${combo}`;
            spawnParticles(activeBlock.x + activeBlock.width/2, activeBlock.y + BLOCK_HEIGHT, '#f1c40f', 18);
        } else {
            combo = 0;
            screenShake = 3;
            document.getElementById('comboText').innerText = '';
            playSound('land');

            let sliceX, sliceWidth;
            if (diff < 0) { 
                sliceX = activeBlock.x; sliceWidth = topBlock.x - activeBlock.x;
                activeBlock.width += diff; activeBlock.x = topBlock.x;
            } else { 
                sliceX = topBlock.x + topBlock.width; sliceWidth = diff;
                activeBlock.width -= diff;
            }

            if (activeBlock.width > 0) {
                fallingSlices.push({
                    x: sliceX, y: activeBlock.y, width: sliceWidth, height: BLOCK_HEIGHT,
                    vx: diff < 0 ? -2.5 : 2.5, vy: -1.5, angle: 0, rotSpeed: (Math.random() - 0.5) * 0.25,
                    color: activeBlock.color
                });
                spawnParticles(sliceX + sliceWidth/2, activeBlock.y + BLOCK_HEIGHT/2, '#b37446', 10);
            }
        }

        if (activeBlock.width <= 0) {
            endGame();
            return;
        }

        blocks.push({
            x: activeBlock.x, y: activeBlock.y, width: activeBlock.width, color: activeBlock.color
        });

        score++;
        document.getElementById('scoreVal').innerText = score;
        spawnNextBlock();
    }

    function endGame() {
        gameActive = false; playSound('fail'); screenShake = 12;
        spawnParticles(activeBlock.x + activeBlock.width/2, activeBlock.y + BLOCK_HEIGHT/2, activeBlock.color, 30);

        // ПОТОЛОК ЗАРЕЗАН ПОД КОРЕНЬ: Чистый безлимитный доход
        const totalWood = score * 4;

        document.getElementById('screenTitle').innerText = "СТРОЙКА ЗАВЕРШЕНА! 🪓";
        document.getElementById('screenDesc').innerText = "Башня Михалыча потеряла точку опоры. Конструкция утилизирована на дрова.";
        document.getElementById('finalScore').innerText = score;
        document.getElementById('finalWood').innerText = totalWood + " 🪵";
        
        // Скрываем топ, чтобы не перегружать интерфейс финала
        document.getElementById('leaderboardContainer').style.display = 'none';
        document.getElementById('rewardInfo').style.display = 'block';
        document.getElementById('actionBtn').innerText = "Забрать дрова 🪵";

        document.getElementById('screenOverlay').style.display = 'flex';
    }

    function handleBtnClick() {
        const btnText = document.getElementById('actionBtn').innerText;
        if (btnText.includes("ЗАБРАТЬ") || btnText.includes("дрова")) {
            if (tg) { tg.sendData("tower_score:" + score); tg.close(); } 
            else { 
                alert("WebApp Тест: Счёт отправлен в бот tower_score:" + score); 
                document.getElementById('rewardInfo').style.display = 'none';
                loadLeaderboard(); // Возвращаем топ обратно после ручного теста
                document.getElementById('actionBtn').innerText = "Раздуть стройку! 🏗️";
            }
        } else {
            startGame();
        }
    }

    window.addEventListener('touchstart', (e) => {
        if(e.target.classList.contains('btn')) return;
        e.preventDefault(); handleTap();
    }, {passive: false});

    window.addEventListener('mousedown', (e) => {
        if(e.target.classList.contains('btn')) return;
        handleTap();
    });

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); handleTap(); }
    });

    function gameLoop() {
        if (!gameActive && fallingSlices.length === 0 && particles.length === 0) return;

        cameraOffsetY += (targetCameraOffsetY - cameraOffsetY) * 0.09;

        ctx.save();
        if (screenShake > 0) {
            ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
            screenShake *= 0.82; if(screenShake < 0.2) screenShake = 0;
        }

        let skyH1 = Math.max(3, 30 - score * 0.7);
        let skyH2 = Math.max(1, 12 - score * 0.5);
        let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, `hsl(215, 45%, ${skyH2}%)`);
        gradient.addColorStop(1, `hsl(28, 55%, ${skyH1}%)`);
        ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (score >= 10) {
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            for(let i=0; i<25; i++) {
                let sx = (Math.sin(i * 452) * 0.5 + 0.5) * canvas.width;
                let sy = ((Math.cos(i * 862) * 0.5 + 0.5) * canvas.height + cameraOffsetY * 0.2) % canvas.height;
                ctx.fillRect(sx, sy, 1.8, 1.8);
            }
        }
        if (score >= 18) {
            ctx.save();
            ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(56, 189, 248, 0.4)';
            ctx.fillStyle = 'rgba(241, 245, 249, 0.8)';
            ctx.beginPath();
            ctx.arc(canvas.width - 70, 110 + cameraOffsetY * 0.1, 25, 0, Math.PI * 2);
            ctx.fill(); ctx.restore();
        }

        ctx.fillStyle = 'rgba(255, 255, 255, 0.07)';
        clouds.forEach(c => {
            if (gameActive) c.x += c.speed;
            if (c.x > canvas.width + 60) c.x = -60;
            let renderCloudY = c.y + cameraOffsetY * 0.35;
            if (renderCloudY < canvas.height + 50 && renderCloudY > -50) {
                ctx.beginPath();
                ctx.arc(c.x, renderCloudY, c.width * 0.4, 0, Math.PI * 2);
                ctx.arc(c.x + c.width * 0.3, renderCloudY - c.width * 0.2, c.width * 0.45, 0, Math.PI * 2);
                ctx.arc(c.x + c.width * 0.6, renderCloudY, c.width * 0.35, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        let forestGroundY = canvas.height - 40 + cameraOffsetY;
        if (forestGroundY > -100) {
            ctx.fillStyle = '#0a140b';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let x = 0; x <= canvas.width + 20; x += 16) {
                let treeH = 35 + Math.sin(x * 0.06) * 12;
                ctx.lineTo(x, forestGroundY - treeH);
                ctx.lineTo(x + 8, forestGroundY - treeH - 14);
                ctx.lineTo(x + 16, forestGroundY);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();
        }

        blocks.forEach((b, idx) => {
            let renderB_Y = b.y + cameraOffsetY;
            if (renderB_Y > canvas.height + 50 || renderB_Y < -50) return;

            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, renderB_Y, b.width, BLOCK_HEIGHT);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(b.x, renderB_Y + BLOCK_HEIGHT - 6, b.width, 6);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.fillRect(b.x, renderB_Y, b.width, 4);
        });

        for(let i = fallingSlices.length - 1; i >= 0; i--) {
            let s = fallingSlices[i];
            s.x += s.vx; s.vy += 0.35; s.y += s.vy; s.angle += s.rotSpeed;
            
            ctx.save();
            ctx.translate(s.x + s.width/2, s.y + s.height/2 + cameraOffsetY);
            ctx.rotate(s.angle);
            ctx.fillStyle = s.color;
            ctx.fillRect(-s.width/2, -s.height/2, s.width, s.height);
            ctx.restore();

            if (s.y + cameraOffsetY > canvas.height + 50) fallingSlices.splice(i, 1);
        }

        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.vy += 0.18; p.y += p.vy; p.alpha -= 0.022;
            if(p.alpha <= 0) { particles.splice(i, 1); continue; }
            ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y + cameraOffsetY, p.size, p.size); ctx.restore();
        }

        if (gameActive) {
            activeBlock.x += activeBlock.speed;
            if (activeBlock.speed > 0 && activeBlock.x + activeBlock.width >= canvas.width) {
                activeBlock.speed = -activeBlock.speed; activeBlock.x = canvas.width - activeBlock.width;
            } else if (activeBlock.speed < 0 && activeBlock.x <= 0) {
                activeBlock.speed = -activeBlock.speed; activeBlock.x = 0;
            }
            
            let renderActiveY = activeBlock.y + cameraOffsetY;
            ctx.fillStyle = activeBlock.color;
            ctx.fillRect(activeBlock.x, renderActiveY, activeBlock.width, BLOCK_HEIGHT);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(activeBlock.x, renderActiveY + BLOCK_HEIGHT - 6, activeBlock.width, 6);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.fillRect(activeBlock.x, renderActiveY, activeBlock.width, 4);
        }

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    resize();
    // Инициализация топа при загрузке страницы
    loadLeaderboard();
</script>
</body>
</html>
